<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — SkyGo</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #0a0f1e 0%, #0d1a35 100%);
        color: #e2e8f0;
      }
      .container {
        text-align: center;
        padding: 2rem;
        max-width: 28rem;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 1rem;
        opacity: 0.85;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
        color: #fff;
      }
      p {
        color: #94a3b8;
        margin: 0 0 1.5rem;
        line-height: 1.5;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      button {
        background: #0ea5e9;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 500;
        transition: background 0.15s;
      }
      button:hover {
        background: #0284c7;
      }
      button.secondary {
        background: transparent;
        color: #94a3b8;
        border: 1px solid #334155;
      }
      button.secondary:hover {
        background: #1e293b;
        color: #e2e8f0;
      }
      .status {
        margin-top: 1rem;
        font-size: 0.85rem;
        color: #64748b;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>Bạn đang offline</h1>
      <p>Hãy kiểm tra kết nối mạng rồi thử lại. Nếu trang vẫn không tải được sau khi đã có mạng, bấm "Cập nhật phiên bản mới".</p>
      <div class="actions">
        <button onclick="location.reload()">Thử lại</button>
        <button class="secondary" onclick="forceRecovery()">Cập nhật phiên bản mới</button>
      </div>
      <div class="status" id="status"></div>
    </div>

    <script>
      // ── Auto-recovery: tự kiểm tra SW mới mỗi khi vào trang này ──
      // Nếu có SW đang waiting (vì user click Update trước đó nhưng kẹt),
      // bảo nó skipWaiting và reload khi controller change.
      (async function autoCheckUpdate() {
        if (!("serviceWorker" in navigator)) return;
        try {
          const regs = await navigator.serviceWorker.getRegistrations();
          // Force update check (fetch sw.js từ network để phát hiện SW mới)
          await Promise.all(regs.map((r) => r.update().catch(() => {})));

          // Khi controller mới active → tự reload để vào app thật
          let reloaded = false;
          navigator.serviceWorker.addEventListener("controllerchange", () => {
            if (reloaded) return;
            reloaded = true;
            location.reload();
          });

          // Nếu đã có SW waiting, kích nó ngay
          regs.forEach((reg) => {
            if (reg.waiting) {
              reg.waiting.postMessage({ type: "SKIP_WAITING" });
            }
          });
        } catch (_) {
          /* im lặng */
        }
      })();

      // ── Manual recovery: cho user click "Cập nhật phiên bản mới" ──
      // Unregister tất cả SW + xóa toàn bộ cache → reload sạch như tab mới.
      // Dùng khi auto-update kẹt (ví dụ SW cũ broken không cho prompt hiện).
      async function forceRecovery() {
        const status = document.getElementById("status");
        status.textContent = "Đang dọn cache và service worker…";
        try {
          if ("serviceWorker" in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((r) => r.unregister()));
          }
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((k) => caches.delete(k)));
          }
          status.textContent = "Đã dọn xong. Đang tải lại…";
          // location.reload() sau khi unregister sẽ KHÔNG đi qua SW nào →
          // browser fetch index.html và assets thẳng từ server.
          setTimeout(() => location.reload(), 300);
        } catch (e) {
          status.textContent = "Có lỗi: " + (e && e.message ? e.message : e);
        }
      }
    </script>
  </body>
</html>
