<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!--
    Airplane top-down silhouette, all one connected shape.
    Pointing up (nose at top), centered at 0,0 then translated to 256,256.
    Rotate 45deg so it flies toward upper-right.

    Shape breakdown (Y axis: negative = up/nose):
      - Nose: pointed top
      - Fuselage: narrow pill
      - Main wings: sweep back from mid-fuselage, wide span
      - Engine nacelles: small bumps on wings
      - Tail: narrow horizontal stabilizers + vertical fin
  -->
  <g transform="translate(256,256) rotate(45)">
    <path fill="white" d="
      M 0,-155
      C 12,-155 22,-140 22,-110
      L 22,-30
      C 40,-28 160,10 170,30
      C 175,40 170,55 160,52
      L 22,20
      L 22,85
      C 36,87 62,97 66,108
      C 68,116 63,124 56,122
      L 22,112
      L 22,130
      C 22,148 12,158 0,158
      C -12,158 -22,148 -22,130
      L -22,112
      L -56,122
      C -63,124 -68,116 -66,108
      C -62,97 -36,87 -22,85
      L -22,20
      L -160,52
      C -170,55 -175,40 -170,30
      C -160,10 -40,-28 -22,-30
      L -22,-110
      C -22,-140 -12,-155 0,-155
      Z
    "/>
  </g>
</svg>
